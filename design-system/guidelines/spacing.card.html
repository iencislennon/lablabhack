<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing Scale" subtitle="4px grid — space-1 through space-16, radius tokens" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: #fff; font-family: var(--font-sans); padding: 16px; }
  .row { display: flex; align-items: flex-end; gap: 12px; margin-bottom: 16px; }
  .block-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .block { background: var(--color-navy); border-radius: 2px; width: 100%; }
  .token { font-size: 9px; color: var(--color-text-muted); font-family: var(--font-mono); text-align: center; }
  .radius-row { display: flex; gap: 12px; align-items: center; }
  .r-block { width: 40px; height: 28px; background: var(--color-border); }
  .r-label { font-size: 10px; color: var(--color-text-muted); margin-top: 4px; font-family: var(--font-mono); }
</style>
</head>
<body>
<div class="row">
  <div class="block-wrap"><div class="block" style="height:4px;width:24px"></div><div class="token">4px</div><div class="token">--space-1</div></div>
  <div class="block-wrap"><div class="block" style="height:8px;width:24px"></div><div class="token">8px</div><div class="token">--space-2</div></div>
  <div class="block-wrap"><div class="block" style="height:12px;width:24px"></div><div class="token">12px</div><div class="token">--space-3</div></div>
  <div class="block-wrap"><div class="block" style="height:16px;width:24px"></div><div class="token">16px</div><div class="token">--space-4</div></div>
  <div class="block-wrap"><div class="block" style="height:20px;width:24px"></div><div class="token">20px</div><div class="token">--space-5</div></div>
  <div class="block-wrap"><div class="block" style="height:24px;width:24px"></div><div class="token">24px</div><div class="token">--space-6</div></div>
  <div class="block-wrap"><div class="block" style="height:32px;width:24px"></div><div class="token">32px</div><div class="token">--space-8</div></div>
  <div class="block-wrap"><div class="block" style="height:40px;width:24px"></div><div class="token">40px</div><div class="token">--space-10</div></div>
  <div class="block-wrap"><div class="block" style="height:48px;width:24px"></div><div class="token">48px</div><div class="token">--space-12</div></div>
</div>
<div class="radius-row">
  <div><div class="r-block" style="border-radius:4px"></div><div class="r-label">4px sm</div></div>
  <div><div class="r-block" style="border-radius:6px"></div><div class="r-label">6px md</div></div>
  <div><div class="r-block" style="border-radius:8px"></div><div class="r-label">8px lg (max)</div></div>
</div>
</body>
</html>
