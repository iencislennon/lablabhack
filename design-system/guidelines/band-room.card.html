<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:#fff; padding:16px; }
  .term { background:#0f1623; border-radius:8px; padding:12px 16px; }
  .hdr { font-size:10px; font-family:var(--font-mono); color:#475569; letter-spacing:0.1em; margin-bottom:8px; display:flex; align-items:center; gap:8px; }
  .dot { width:6px; height:6px; border-radius:50%; background:#22c55e; }
  .line { font-size:11.5px; font-family:var(--font-mono); line-height:1.6; margin-bottom:1px; }
  .ts { color:#334155; margin-right:10px; }
</style>
</head>
<body>
<div class="term">
  <div class="hdr">BAND ROOM <div class="dot"></div></div>
  <div class="line"><span class="ts">09:14:22</span><span style="color:#64748b">pipeline_start   scenario="Regional drought assessment — North Africa"</span></div>
  <div class="line"><span class="ts">09:14:23</span><span style="color:#a78bfa">phase            phase=1  label="Independent agents"</span></div>
  <div class="line"><span class="ts">09:14:31</span><span style="color:#6DCFB0">agent_done       agent=farmer  deficit_pct=34.2  risk=0.78</span></div>
  <div class="line"><span class="ts">09:14:45</span><span style="color:#fbbf24">band_room_conflicts   count=2</span></div>
  <div class="line"><span class="ts">09:15:02</span><span style="color:#68d391">pipeline_complete   confidence=0.66  escalate=true</span></div>
</div>
</body>
</html>
